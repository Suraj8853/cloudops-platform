name: CI-API service
on:
  push:
    branches: ["main"]
    paths:
      - 'apps/api/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'apps/api/**'
env:
  AWS_REGION: "ap-south-1"
  ECR_REPOSITORY: cloudops-dev-api
  AWS_ACCOUNT_ID:  599476212737
jobs:
  lint:
    name: Lint the cloudops-dev-api
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code 
        uses: actions/checkout@v4
      - name: setup the nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      - name: Install the dependencies
        working-directory: apps/api/
        run: npm ci 

      - name: Run Lint
        working-directory: apps/api
        run: npm run lint --if-present
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      - name: Install dependencies
        working-directory: apps/api
        run: npm ci
      - name: run the tests
        working-directory: apps/api
        run: npm test --if-present
  build-and-push:
    name: build and push to ECR 
    needs: test
    uses: ./.github/workflows/resuable-docker.push.yaml
    with:
      service-name: 'api'
      ecr-repo: 'cloudops-dev-api'
      dockerfile-path: 'apps/api'

          

  