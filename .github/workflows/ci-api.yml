name: CI-API service
on:
  push:
    branches: ["main"]
    paths:
      - 'apps/api/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'apps/api/**'
env:
  AWS_REGION: "ap-south-1"
  ECR_REPOSITORY: cloudops-dev-api
  AWS_ACCOUNT_ID:  599476212737
jobs:
  lint:
    name: Lint the cloudops-dev-api
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code 
        uses: actions/checkout@v4
      - name: setup the nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      - name: Install the dependencies
        working-directory: apps/api/
        run: npm ci 

      - name: Run Lint
        working-directory: apps/api
        run: npm run lint --if-present
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      - name: Install dependencies
        working-directory: apps/api
        run: npm ci
      - name: run the tests
        working-directory: apps/api
        run: npm test --if-present
  build-and-push:
    name: build and push to ECR 
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::599476212737:role/cloudops-dev-github-actions-role
          aws-region: ap-south-1
      - name: login to aws ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build Docker image 
        working-directory: apps/api
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} . 
          docker tag $ECR_REPOSITORY:${{ github.sha }} \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }} 
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
      - name: push to ECR
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}
          

  