name: CI-Dashboard service
on:
  push:
    branches:
      - "main"
    paths:
      - "apps/dashboard/**"
      - ".github/workflows/ci-dashboard.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "apps/dashboard/**"

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: cloudops-dev-dashboard
  AWS_ACCOUNT_ID: 599476212737
jobs:
  lint:
    name: lint the code
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: setup nodejs
        working-directory: apps/dashboard/
        run: npm ci
      - name: run the lint
        working-directory: apps/dashboard/
        run: npm run lint --if-present

  build-and-push:
    name: build and push the image to ECR_REPOSITORY
    runs-on: ubuntu-latest
    needs: lint 
    permissions:
      id-token: write
      contents: read
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials 
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::599476212737:role/cloudops-dev-github-actions-role
          aws-region: ap-south-1
      - name: login to aws 
        uses: aws-actions/amazon-ecr-login@v2
      - name: build the docker image
        working-directory: apps/dashboard/
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} .
          docker tag $ECR_REPOSITORY:${{ github.sha }} \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}
      - name: run the trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
      - name: push the image to ECR
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}
          
        
