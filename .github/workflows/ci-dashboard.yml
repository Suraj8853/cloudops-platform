name: CI-Dashboard service
on:
  push:
    branches:
      - "main"
    paths:
      - "apps/dashboard/**"
      - ".github/workflows/ci-dashboard.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "apps/dashboard/**"

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: cloudops-dev-dashboard
  AWS_ACCOUNT_ID: 599476212737
jobs:
  lint:
    name: lint the code
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: setup nodejs
        working-directory: apps/dashboard/
        run: npm ci
      - name: run the lint
        working-directory: apps/dashboard/
        run: npm run lint --if-present

  build-and-push:
    name: build and push the image to ECR_REPOSITORY
    needs: lint 
    uses: ./.github/workflows/resuable-docker-push.yaml
    with:
      service-name: 'dashboard'
      ecr-repo: 'cloudops-dev-dashboard'
      dockerfile-path: 'apps/dashboard'
   

          
        
