name: Reuseable docker and push
on:
  workflow_call:
    inputs:
      service-name: 
        description: 'Name of the service being built'
        required: true
        type: string
      ecr-repo:
        description: 'ECR repo name'
        required: true
        type: string
      dockerfile-path:
        description: 'path of the dockerfile'
        required: true
        type: string
env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: 599476212737
jobs:
  build-and-push:
    name: Build,Scan and push  ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials 
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::599476212737:role/cloudops-dev-github-actions-role
          aws-region: ap-south-1
      - name: login to aws 
        uses: aws-actions/amazon-ecr-login@v2
      - name: build the docker image
        working-directory: ${{ inputs.dockerfile-path }}
        run: |
          docker build -t ${{ inputs.ecr-repo }}:${{ github.sha }} .
          docker tag ${{ inputs.ecr-repo }}:${{ github.sha }} \
          ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ inputs.ecr-repo }}:${{ github.sha }}
      - name: run the trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.ecr-repo }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
      - name: push the image to ECR
        run: |
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ inputs.ecr-repo }}:${{ github.sha }}
      